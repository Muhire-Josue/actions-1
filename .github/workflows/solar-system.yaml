name: Solar system workflow

on:
   workflow_dispatch:
   push:
    branches:
        - main
        - 'features/*'
jobs:
    unit-test:
        name: Unit Testing
        runs-on: ubuntu-latest
        steps:
           - name: Checkout repository
             uses: actions/checkout@v4

           - name: Setup Nodejs Version - 18
             uses: actions/setup-node@v3
             with:
                node-version: 18

           - name: Install Dependencies
             run: npm install
           
           - name: Unit Test
             run: npm run test