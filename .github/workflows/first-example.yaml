name: My First Workflow
on: push
jobs:
    first_job:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
            - name: List and read files
              run: | 
                echo "My first job"
                ls -lstra
                cat README.md
            - name: Generate ASCII Artwork
              run: cowsay -f dragon "Run for cover, I am a DRAGON... RAWRR" >> dragon.txt

            - name: README FILE
              run: cat README.md